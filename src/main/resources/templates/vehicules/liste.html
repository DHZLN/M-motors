<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des véhicules</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<h1>Recherche de véhicules</h1>

<form th:action="@{/vehicules}" method="get">
    <div>
        <label for="marque">Marque :</label>
        <input type="text" id="marque" name="marque" th:value="${marque}">
    </div>

    <div>
        <label for="modele">Modèle :</label>
        <input type="text" id="modele" name="modele" th:value="${modele}">
    </div>

    <div>
        <label for="typeOffre">Type d'offre :</label>
        <select id="typeOffre" name="typeOffre">
            <option value="">Tous</option>
            <option value="ACHAT" th:selected="${typeOffre != null and typeOffre.name() == 'ACHAT'}">Achat</option>
            <option value="LLD" th:selected="${typeOffre != null and typeOffre.name() == 'LLD'}">LLD</option>
        </select>
    </div>

    <button type="submit">Rechercher</button>
</form>

<hr>

<div th:if="${vehicules == null or vehicules.isEmpty()}">
    <p>Aucun véhicule trouvé.</p>
</div>

<div th:if="${vehicules != null and !vehicules.isEmpty()}">
    <table border="1">
        <thead>
        <tr>
            <th>ID</th>
            <th>Marque</th>
            <th>Modèle</th>
            <th>Année</th>
            <th>Kilométrage</th>
            <th>Prix achat</th>
            <th>Loyer mensuel</th>
            <th>Type d'offre</th>
            <th>Détail</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="vehicule : ${vehicules}">
            <td th:text="${vehicule.id}"></td>
            <td th:text="${vehicule.marque}"></td>
            <td th:text="${vehicule.modele}"></td>
            <td th:text="${vehicule.annee}"></td>
            <td th:text="${vehicule.kilometrage}"></td>
            <td th:text="${vehicule.prixAchat}"></td>
            <td th:text="${vehicule.loyerMensuel}"></td>
            <td th:text="${vehicule.typeOffre}"></td>
            <td>
                <a th:href="@{/vehicules/{id}(id=${vehicule.id})}">Voir</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
