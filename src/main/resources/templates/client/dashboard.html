<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mes dossiers</title>
</head>
<body>
<h1>Mes dossiers</h1>

<div th:if="${dossiers == null or dossiers.isEmpty()}">
    <p>Aucun dossier trouvé.</p>
</div>

<table border="1" th:if="${dossiers != null and !dossiers.isEmpty()}">
    <thead>
    <tr>
        <th>ID</th>
        <th>Statut</th>
        <th>Type d'offre</th>
        <th>Date création</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="dossier : ${dossiers}">
        <td th:text="${dossier.id}"></td>
        <td th:text="${dossier.statut}"></td>
        <td th:text="${dossier.typeOffre}"></td>
        <td th:text="${dossier.dateCreation}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
